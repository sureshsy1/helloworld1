apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sureshsy1/helloworld1.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: suresh-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
